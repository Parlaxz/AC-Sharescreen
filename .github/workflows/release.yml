# ═══════════════════════════════════════════════════════════════════════════════
# ScreenLink — Windows x64 Release Workflow
#
# Triggered by:
#   Manual workflow_dispatch that creates a draft release, builds everything,
#   uploads artifacts, verifies integrity, and publishes the draft.
#
# Builds the native audio helper, TypeScript packages, and the Electron desktop
# app, then uploads updater metadata and installers to the draft GitHub Release.
# ═══════════════════════════════════════════════════════════════════════════════

name: Build and Release ScreenLink (Windows x64)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and publish (e.g. v0.2.5)"
        required: true
        type: string
      release_type:
        description: "Type of release"
        required: false
        default: "stable"
        type: choice
        options:
          - stable
          - prerelease

concurrency:
  group: release-${{ github.event.inputs.tag }}
  cancel-in-progress: false

# Required to upload assets to releases
permissions:
  contents: write

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10"

jobs:
  build-and-release:
    name: Build and release
    runs-on: windows-latest
    # Always run — only workflow_dispatch triggers this workflow

    outputs:
      tag: ${{ steps.determine-tag.outputs.tag }}
      version: ${{ steps.determine-version.outputs.version }}
      setup_exe: ${{ steps.discover-artifacts.outputs.setup_exe }}
      blockmap: ${{ steps.discover-artifacts.outputs.blockmap }}
      portable_exe: ${{ steps.discover-artifacts.outputs.portable_exe }}

    steps:
      # ── 1. Determine the release tag ──────────────────────────────────
      - name: Determine release tag
        id: determine-tag
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          Write-Host "tag=$tag"
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Validate and derive version
        id: determine-version
        shell: pwsh
        run: |
          $tag = "${{ steps.determine-tag.outputs.tag }}"
          if (-not ($tag -match '^v\d+\.\d+\.\d+$')) {
            Write-Host "::error::Release tag '$tag' must match vMAJOR.MINOR.PATCH (e.g. v0.1.1)"
            exit 1
          }
          # Strip leading "v"
          $version = $tag.Substring(1)
          Write-Host "version=$version"
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Ensure draft release exists
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.determine-tag.outputs.tag }}"
          $release = gh release view "$tag" --json isDraft,isPrerelease 2>$null
          if (-not $release) {
            Write-Host "Creating draft release for $tag..."
            gh release create "$tag" --draft --title "$tag" --notes ""
            if ($LASTEXITCODE -ne 0) {
              Write-Host "::error::Failed to create draft release for $tag"
              exit 1
            }
            Write-Host "Draft release created."
          } else {
            $releaseObj = $release | ConvertFrom-Json
            if ($releaseObj.isDraft -or ($releaseObj.isPrerelease -and "${{ github.event.inputs.release_type }}" -eq "stable")) {
              Write-Host "Using existing draft release for $tag"
            } else {
              Write-Host "::error::Release $tag is already published. Cannot modify."
              exit 1
            }
          }

      # ── 2. Check out exact tag ──────────────────────────────────────
      - name: Check out exact tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.determine-tag.outputs.tag }}
          fetch-depth: 0

      # ── 3. Set up Node.js and pnpm ───────────────────────────────────
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-store
        shell: pwsh
        run: |
          echo "store_path=$(pnpm store path)" >> $env:GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 4. Set release version ───────────────────────────────────────
      - name: Set release version
        id: set-version
        shell: pwsh
        run: |
          node scripts/set-release-version.mjs "${{ steps.determine-version.outputs.version }}"

      - name: Verify version consistency
        shell: pwsh
        run: |
          $expected = "${{ steps.determine-version.outputs.version }}"
          $rootVersion = node -e "console.log(require('./package.json').version)"
          $desktopVersion = node -e "console.log(require('./apps/desktop/package.json').version)"
          if ($rootVersion -ne $expected) {
            Write-Host "::error::Root package.json version mismatch: expected $expected, got $rootVersion"
            exit 1
          }
          if ($desktopVersion -ne $expected) {
            Write-Host "::error::Desktop package.json version mismatch: expected $expected, got $desktopVersion"
            exit 1
          }
          if ($rootVersion -ne $desktopVersion) {
            Write-Host "::error::Package versions do not match: root=$rootVersion desktop=$desktopVersion"
            exit 1
          }
          Write-Host "All package versions match: $expected"

      # ── 5. Build native helpers ──────────────────────────────────────
      - name: Configure audio helper (CMake)
        shell: pwsh
        run: |
          cmake -S native/audio-helper -B native/audio-helper/build `
            -G "Visual Studio 17 2022" -A x64

      - name: Build audio helper (Release)
        shell: pwsh
        run: |
          cmake --build native/audio-helper/build --config Release

      - name: Run audio helper self-test
        id: audio-helper-self-test
        shell: pwsh
        run: |
          $helper = "native/audio-helper/build/Release/screenlink-audio-helper.exe"
          if (-not (Test-Path $helper)) {
            Write-Host "::error::Audio helper binary not found at $helper"
            exit 1
          }
          & $helper --self-test
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Audio helper self-test failed with exit code $LASTEXITCODE"
            exit 1
          }
          Write-Host "Audio helper self-test passed."

      - name: Configure video enhancer (CMake, no VFX SDK in CI)
        shell: pwsh
        run: |
          cmake -S native/video-enhancer -B native/video-enhancer/build `
            -G "Visual Studio 17 2022" -A x64

      - name: Build video enhancer (Release)
        shell: pwsh
        run: |
          cmake --build native/video-enhancer/build --config Release

      - name: Run video enhancer self-test
        id: video-enhancer-self-test
        shell: pwsh
        run: |
          $helper = "native/video-enhancer/build/Release/screenlink-video-enhancer.exe"
          if (-not (Test-Path $helper)) {
            Write-Host "::error::Video enhancer binary not found at $helper"
            exit 1
          }
          & $helper --self-test
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Video enhancer self-test failed with exit code $LASTEXITCODE"
            exit 1
          }
          Write-Host "Video enhancer self-test passed."

      # ── 6. TypeScript checks and tests ───────────────────────────────
      - name: Type check all packages
        shell: pwsh
        run: pnpm typecheck

      - name: Run tests
        id: run-tests
        shell: pwsh
        run: pnpm test -- --reporter=verbose

      # ── 7. Build packages ───────────────────────────────────────────
      - name: Build shared package
        run: pnpm build:shared

      - name: Build vdo-adapter
        run: pnpm build:vdo-adapter

      - name: Build desktop
        run: pnpm build:desktop

      - name: Verify desktop build output
        shell: pwsh
        run: |
          $errors = @()
          if (-not (Test-Path "apps/desktop/dist/main/main.js")) {
            $errors += "dist/main/main.js is missing"
          }
          if (-not (Test-Path "apps/desktop/dist/preload/index.js")) {
            $errors += "dist/preload/index.js is missing"
          }
          if (-not (Test-Path "apps/desktop/dist/renderer/index.html")) {
            $errors += "dist/renderer/index.html is missing"
          }
          if ($errors.Count -gt 0) {
            foreach ($e in $errors) { Write-Host "::error::$e" }
            exit 1
          }
          Write-Host "Desktop build output verified."

      # ── 8. Package with Electron Builder ─────────────────────────────
      - name: Package Windows x64
        id: package
        shell: pwsh
        working-directory: apps/desktop
        run: |
          npx electron-builder --win --x64 --config electron-builder.config.cjs --publish never
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Electron Builder packaging failed"
            exit 1
          }

      # ── 9. Validate all artifacts ────────────────────────────────────
      - name: Validate release artifacts
        id: validate-artifacts
        shell: pwsh
        run: |
          $version = "${{ steps.determine-version.outputs.version }}"
          $releaseDir = "release"
          $errors = @()

          # latest.yml
          if (-not (Test-Path "$releaseDir/latest.yml")) {
            $errors += "latest.yml is missing"
          }

          # latest.yml version check
          if (Test-Path "$releaseDir/latest.yml") {
            $yml = Get-Content "$releaseDir/latest.yml" -Raw
            if ($yml -notmatch "version: $version") {
              $errors += "latest.yml version does not match $version"
            }
            if ($yml -notmatch "\.exe") {
              $errors += "latest.yml does not reference an .exe installer"
            }
            # Ensure latest.yml does NOT reference the portable artifact
            if ($yml -match "portable") {
              $errors += "latest.yml appears to reference a portable build"
            }
          }

          # Setup EXE
          $setupExe = Get-ChildItem "$releaseDir/ScreenLink-Setup-*.exe" -ErrorAction SilentlyContinue
          if (-not $setupExe) {
            $errors += "ScreenLink-Setup EXE not found in $releaseDir"
          }

          # Blockmap
          $blockmap = Get-ChildItem "$releaseDir/ScreenLink-Setup-*.exe.blockmap" -ErrorAction SilentlyContinue
          if (-not $blockmap) {
            $errors += "ScreenLink-Setup blockmap not found in $releaseDir"
          }

          # Portable EXE
          $portableExe = Get-ChildItem "$releaseDir/ScreenLink-Portable-*.exe" -ErrorAction SilentlyContinue
          if (-not $portableExe) {
            $errors += "Portable EXE not found in $releaseDir"
          }

          # Packaged resources (win-unpacked)
          $unpackedAudioHelper = "$releaseDir/win-unpacked/resources/screenlink-audio-helper.exe"
          if (-not (Test-Path $unpackedAudioHelper)) {
            $errors += "Packaged audio helper is missing from win-unpacked"
          }

          $unpackedVideoHelper = "$releaseDir/win-unpacked/resources/screenlink-video-enhancer.exe"
          if (-not (Test-Path $unpackedVideoHelper)) {
            $errors += "Packaged video enhancer is missing from win-unpacked"
          }

          $unpackedTray = "$releaseDir/win-unpacked/resources/tray-icon.png"
          if (-not (Test-Path $unpackedTray)) {
            $errors += "Packaged tray icon is missing from win-unpacked"
          }

          $appUpdateYml = "$releaseDir/win-unpacked/resources/app-update.yml"
          if (-not (Test-Path $appUpdateYml)) {
            $errors += "app-update.yml is missing from win-unpacked/resources"
          } else {
            $updateYml = Get-Content $appUpdateYml -Raw
            if ($updateYml -match "token") {
              $errors += "app-update.yml contains a token!"
            }
            if ($updateYml -notmatch "Parlaxz") {
              $errors += "app-update.yml does not point to Parlaxz/AC-Sharescreen"
            }
            if ($updateYml -notmatch "AC-Sharescreen") {
              $errors += "app-update.yml does not point to AC-Sharescreen"
            }
          }

          # Main entry in asar
          $asarMain = "$releaseDir/win-unpacked/resources/app.asar/package.json"
          if (Test-Path $asarMain) {
            $asarPkg = Get-Content $asarMain -Raw | ConvertFrom-Json
            $asarVersion = $asarPkg.version
            if ($asarVersion -ne $version) {
              $errors += "Packaged app version ($asarVersion) does not match release version ($version)"
            }
          } else {
            # Not using asar — check dist/main/main.js directly
            $mainEntry = "$releaseDir/win-unpacked/resources/app/dist/main/main.js"
            if (-not (Test-Path $mainEntry)) {
              $errors += "Main entry (dist/main/main.js) not found in packaged app"
            }
          }

          if ($errors.Count -gt 0) {
            foreach ($e in $errors) { Write-Host "::error::$e" }
            exit 1
          }

          # Set outputs for later steps
          $setupExeName = $setupExe.Name
          $blockmapName = $blockmap.Name
          $portableExeName = $portableExe.Name

          echo "setup_exe=$setupExeName" >> $env:GITHUB_OUTPUT
          echo "blockmap=$blockmapName" >> $env:GITHUB_OUTPUT
          echo "portable_exe=$portableExeName" >> $env:GITHUB_OUTPUT

          Write-Host "All artifacts validated successfully."
          Write-Host "  Setup EXE: $setupExeName ($( [math]::Round($setupExe.Length / 1MB, 1) ) MB)"
          Write-Host "  Blockmap: $blockmapName ($( [math]::Round($blockmap.Length / 1KB, 1) ) KB)"
          Write-Host "  Portable: $portableExeName ($( [math]::Round($portableExe.Length / 1MB, 1) ) MB)"
          Write-Host "  latest.yml: present"
          Write-Host "  app-update.yml: present (no token)"

          # Verify latest.yml 'path' matches the actual setup filename
          if (Test-Path "$releaseDir/latest.yml") {
              $ymlContent = Get-Content "$releaseDir/latest.yml" -Raw
              # Extract the 'path' field
              $ymlPath = ($ymlContent | Select-String '(?<=^path: ).*$' -Raw | ForEach-Object { $_.Trim() })
              $actualSetupName = $setupExe.Name
              if ($ymlPath -ne $actualSetupName) {
                  $errors += "latest.yml path '$ymlPath' does not match actual setup filename '$actualSetupName'"
              }

              # Extract the 'url' field from files array
              $ymlUrl = ($ymlContent | Select-String '(?<=^  - url: ).*$' -Raw | ForEach-Object { $_.Trim() })
              if ($ymlUrl -and $ymlUrl -ne $actualSetupName) {
                  $errors += "latest.yml url '$ymlUrl' does not match actual setup filename '$actualSetupName'"
              }

              # Verify blockmap path
              $expectedBlockmap = "$actualSetupName.blockmap"
              if ($blockmap.Name -ne $expectedBlockmap) {
                  $errors += "Blockmap name '$($blockmap.Name)' does not match expected '$expectedBlockmap'"
              }
          }

          if ($errors.Count -gt 0) {
              foreach ($e in $errors) { Write-Host "::error::$e" }
              exit 1
          }

      # ── 10. Upload artifacts to existing release ──────────────────────
      - name: Upload artifacts to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.determine-tag.outputs.tag }}"
          $releaseDir = "release"

          # Required updater assets
          $requiredAssets = @(
            "latest.yml",
            ${{ steps.validate-artifacts.outputs.setup_exe }},
            ${{ steps.validate-artifacts.outputs.blockmap }}
          )

          # Optional distribution asset
          $optionalAssets = @(
            ${{ steps.validate-artifacts.outputs.portable_exe }}
          )

          $allAssets = $requiredAssets + $optionalAssets
          $uploadErrors = @()

          foreach ($asset in $allAssets) {
            $path = "$releaseDir/$asset"
            if (Test-Path $path) {
              Write-Host "Uploading $asset..."
              gh release upload "$tag" "$path" --clobber
              if ($LASTEXITCODE -ne 0) {
                $uploadErrors += "Failed to upload $asset"
              }
            } else {
              $uploadErrors += "Asset not found for upload: $asset"
            }
          }

          if ($uploadErrors.Count -gt 0) {
            foreach ($e in $uploadErrors) { Write-Host "::error::$e" }
            exit 1
          }

          Write-Host "Upload complete."

      # ── 11. Post-upload verification ─────────────────────────────────
      - name: Verify uploaded assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.determine-tag.outputs.tag }}"
          $requiredAssets = @(
            "latest.yml",
            ${{ steps.validate-artifacts.outputs.setup_exe }},
            ${{ steps.validate-artifacts.outputs.blockmap }}
          )

          $releaseInfo = gh release view "$tag" --json assets 2>$null
          if (-not $releaseInfo) {
            Write-Host "::error::Failed to fetch release info for '$tag'"
            exit 1
          }

          $releaseObj = $releaseInfo | ConvertFrom-Json
          $assetNames = $releaseObj.assets | ForEach-Object { $_.name }

          $missing = @()
          foreach ($asset in $requiredAssets) {
            if ($assetNames -notcontains $asset) {
              $missing += $asset
            }
          }

          if ($missing.Count -gt 0) {
            Write-Host "::error::Required assets still missing after upload: $($missing -join ', ')"
            exit 1
          }

          Write-Host "All required assets verified on release '$tag'."

      # ── 12. SHA-512 verification ──────────────────────────────────────
      - name: Verify artifact SHA-512 match
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.determine-tag.outputs.tag }}"

          # Download latest.yml from the release
          gh release download "$tag" --pattern "latest.yml" --output "${{ runner.temp }}/verified-latest.yml" --clobber
          if ($LASTEXITCODE -ne 0) {
              Write-Host "::error::Failed to download latest.yml for verification"
              exit 1
          }

          $ymlContent = Get-Content "${{ runner.temp }}/verified-latest.yml" -Raw

          # Parse path and sha512 using regex
          $setupPath = ($ymlContent | Select-String '(?<=^path: ).*$' -Raw | ForEach-Object { $_.Trim() })
          $expectedSha = ($ymlContent | Select-String '(?<=^sha512: ).*' -Raw | ForEach-Object { $_.Trim() })

          if (-not $setupPath -or -not $expectedSha) {
              Write-Host "::error::Could not parse path or sha512 from latest.yml"
              exit 1
          }

          Write-Host "Downloading $setupPath from release $tag..."
          gh release download "$tag" --pattern "$setupPath" --output "${{ runner.temp }}/verified-setup.exe" --clobber
          if ($LASTEXITCODE -ne 0) {
              Write-Host "::error::Failed to download $setupPath for verification"
              exit 1
          }

          $actualSha = (Get-FileHash "${{ runner.temp }}/verified-setup.exe" -Algorithm SHA512).Hash.ToLower()
          $expectedShaNormalized = $expectedSha.ToLower()

          if ($actualSha -ne $expectedShaNormalized) {
              Write-Host "::error::SHA-512 mismatch! Expected: $expectedSha, Got: $actualSha"
              exit 1
          }

          Write-Host "SHA-512 verification PASSED for $setupPath"

      # ── 13. HTTP URL verification ─────────────────────────────────────
      - name: Verify download URLs return HTTP 200
        shell: pwsh
        run: |
          $tag = "${{ steps.determine-tag.outputs.tag }}"
          $ymlContent = Get-Content "${{ runner.temp }}/verified-latest.yml" -Raw
          $setupPath = ($ymlContent | Select-String '(?<=^path: ).*$' -Raw | ForEach-Object { $_.Trim() })

          $baseUrl = "https://github.com/Parlaxz/AC-Sharescreen/releases/download/$tag"

          $urlsToCheck = @(
              "$baseUrl/$setupPath",
              "$baseUrl/$setupPath.blockmap",
              "$baseUrl/latest.yml"
          )

          $errors = @()
          foreach ($url in $urlsToCheck) {
              try {
                  $response = Invoke-WebRequest -Uri $url -Method Head -UseBasicParsing -TimeoutSec 30
                  if ($response.StatusCode -eq 200) {
                      Write-Host "OK: $url"
                  } else {
                      $errors += "HTTP $($response.StatusCode) for $url"
                  }
              } catch {
                  $errors += "Failed to check $url : $_"
              }
          }

          if ($errors.Count -gt 0) {
              foreach ($e in $errors) { Write-Host "::error::$e" }
              exit 1
          }
          Write-Host "All download URLs return HTTP 200."

      # ── 14. Publish release ───────────────────────────────────────────
      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.determine-tag.outputs.tag }}"
          $releaseType = "${{ github.event.inputs.release_type }}"

          if ($releaseType -eq "prerelease") {
            gh release edit "$tag" --draft=false --prerelease
            Write-Host "Draft published as prerelease: $tag"
          } else {
            gh release edit "$tag" --draft=false --latest
            Write-Host "Draft published as latest stable: $tag"
          }

      # ── 15. Job summary ──────────────────────────────────────────────
      - name: Generate job summary
        shell: pwsh
        run: |
          $trigger = "Manual dispatch (${{ github.event.inputs.release_type }})"
          & scripts/generate-release-summary.ps1 `
            -Trigger $trigger `
            -Tag "${{ steps.determine-tag.outputs.tag }}" `
            -Version "${{ steps.determine-version.outputs.version }}" `
            -Sha "${{ github.sha }}" `
            -SetupExe "${{ steps.validate-artifacts.outputs.setup_exe }}" `
            -Blockmap "${{ steps.validate-artifacts.outputs.blockmap }}" `
            -PortableExe "${{ steps.validate-artifacts.outputs.portable_exe }}"
